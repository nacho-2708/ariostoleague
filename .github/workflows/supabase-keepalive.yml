name: Supabase keep-alive

on:
  schedule:
    # Lunes y jueves a las 12:00 UTC (3-4 días entre ejecuciones)
    - cron: '0 12 * * 1,4'
  workflow_dispatch: # permite correr manualmente desde GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/managers?limit=1")

          if [ "$response" = "200" ] || [ "$response" = "206" ]; then
            echo "Supabase ping OK (HTTP $response)"
          else
            echo "Supabase ping failed (HTTP $response)"
            exit 1
          fi
